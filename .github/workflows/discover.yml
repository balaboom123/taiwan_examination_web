name: discover

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run discovery
        run: python -m app discover > discover.json

      - name: Upload discovery artifact
        uses: actions/upload-artifact@v4
        with:
          name: moex-discover
          path: discover.json

