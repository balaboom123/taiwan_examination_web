name: sync-incremental

on:
  workflow_dispatch:
  schedule:
    - cron: "15 3 * * 1"

permissions:
  contents: write

env:
  MOEX_RELEASE_TAG: moex-bundles

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Probe latest source changes
        id: probe
        run: |
          mkdir -p .tmp
          python -m app probe-latest --years 2 --write-manifest --output .tmp/source-probe.json
          should_sync=$(python - <<'PY'
          import json
          from pathlib import Path

          print(str(json.loads(Path(".tmp/source-probe.json").read_text(encoding="utf-8")).get("should_sync", False)).lower())
          PY
          )
          echo "should_sync=$should_sync" >> "$GITHUB_OUTPUT"

      - name: Commit source manifest
        if: steps.probe.outputs.should_sync != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/source-manifest.json
          git diff --cached --quiet || git commit -m "chore: refresh source manifest"
          git push

      - name: Ensure release exists
        if: steps.probe.outputs.should_sync == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$MOEX_RELEASE_TAG" >/dev/null 2>&1 || \
          gh release create "$MOEX_RELEASE_TAG" --title "MOEX canonical bundles" --notes "Canonical multi-year exam bundles"

      - name: Run targeted sync
        if: steps.probe.outputs.should_sync == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          python -m app sync-targeted --probe .tmp/source-probe.json
          --download-affected-bundles
          --release-tag "${{ env.MOEX_RELEASE_TAG }}"
          --bundle-base-url "https://github.com/${{ github.repository }}/releases/download/${{ env.MOEX_RELEASE_TAG }}"

      - name: Upload canonical bundles
        if: steps.probe.outputs.should_sync == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          tag = "moex-bundles"
          assets = json.loads(Path("data/release-assets.json").read_text(encoding="utf-8"))
          for asset in assets:
              local_path = Path(asset["storage_key"])
              if not local_path.exists():
                  continue
              spec = f"{local_path}#{asset['asset_name']}"
              subprocess.run(["gh", "release", "upload", tag, spec, "--clobber"], check=True)
          PY

      - name: Remove stale release assets
        if: steps.probe.outputs.should_sync == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          tag = "moex-bundles"
          desired = {asset["asset_name"] for asset in json.loads(Path("data/release-assets.json").read_text(encoding="utf-8"))}
          current = json.loads(subprocess.check_output(["gh", "release", "view", tag, "--json", "assets"], text=True))
          for asset in current.get("assets", []):
              if asset["name"].endswith(".zip") and asset["name"] not in desired:
                  subprocess.run(["gh", "release", "delete-asset", tag, asset["name"], "--yes"], check=True)
          PY

      - name: Commit regenerated data and site
        if: steps.probe.outputs.should_sync == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data site
          git diff --cached --quiet || git commit -m "chore: refresh targeted canonical bundles"
          git push
